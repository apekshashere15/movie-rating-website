<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie Rating Website</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Header -->
<header class="text-center py-4">

<h1 class="site-title">🎬 Movie Rating Website</h1>

</header>


<div class="container">

<!-- Search Bar -->

<div class="row justify-content-center">

<div class="col-md-6">

<input type="text" id="search" class="form-control search-bar" placeholder="Search movie...">

</div>

</div>


<!-- Movie List -->

<div class="row mt-4" id="movieList">

<!-- Movie cards will load here using JavaScript -->

</div>

</div>


<!-- Footer -->

<footer class="text-center mt-5 mb-3">

<p>Movie Listing Project | Internship Task</p>

</footer>


<script src="script.js"></script>

</html>
